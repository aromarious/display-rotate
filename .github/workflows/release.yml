name: Release

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

jobs:
  reveal-variables:
    runs-on: ubuntu-latest
    steps:
      - name: echo variables
        run: echo "${{ toJson(github.event.repository.url) }}" "${{ github.event.repository.url }}/archive/${{ github.ref }}.tar.gz"

  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v1
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install git-cliff
        run: npm install -g git-cliff

      - name: Create CHANGELOG for release
        run: git-cliff --latest --output latest-release.md

      - name: Create Release
        id: create-release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          body_path: ./latest-release.md
          draft: false
          prerelease: false

  update-homebrew:
    needs: [create-release]
    runs-on: ubuntu-latest
    steps:
      - name: Set Archive URL
        id: archive
        run: |
          echo "archive_url: ${{ github.event.repository.url }}/archive/${{ github.ref }}.tar.gz"
          echo "archive_url=${{ github.event.repository.url }}/archive/${{ github.ref }}.tar.gz" >> $GITHUB_OUTPUT
      - name: Calculate SHA256
        id: sha256
        run: |
          curl -L -s "${{ github.env.archive_url }}" -o release.tar.gz
          echo "sha256=$(sha256sum release.tar.gz | awk '{ print $1 }')" >> $GITHUB_OUTPUT
          echo "sha256: $(sha256sum release.tar.gz | awk '{ print $1 }')"
      - name: Get Version
        id: version
        run: |
          VERSION=$(echo ${{ github.ref }} | sed -e "s#refs/tags/##g")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version: $VERSION"
      - name: Emit repository-dispatch event to Homebrew tap repository
        uses: peter-evans/repository-dispatch@v1
        with:
          token: ${{ secrets.TOKEN }}
          repository: aromarious/homebrew-private
          event-type: update-brew
          client-payload: >
            {
              "formula": "display-rotate",
              "description": "Rotate your display easily on macOS CLI using displayplacer.",
              "url": "${{ steps.archive.outputs.archive_url }}",
              "sha256": "${{ steps.sha256.outputs.sha256 }}",
              "version": "${{ steps.version.outputs.version }}"
            }
