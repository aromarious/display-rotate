name: WorkflowTest

on:
  workflow_dispatch:

jobs:
  workflowtest1:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    - name: Install yq
      run: |
        sudo snap install yq
    - name: Get Brew Tap Parameters
      id: brew-tap
      run: |
        cat ./.brew-tap >> $GITHUB_OUTPUT
      env:
        GITHUB_OUTPUT: $GITHUB_OUTPUT

  workflowtest2:
    needs: [workflowtest1]
    runs-on: ubuntu-latest

    steps:
      - name: Show vars
        run: |
          echo ${{ needs.workflowtest1.outputs.formula }}
          echo ${{ needs.workflowtest1.outputs.description }}
          echo ${{ needs.workflowtest1.outputs.homepage }}
          echo ${{ needs.workflowtest1.outputs.license }}
